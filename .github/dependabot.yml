version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      routine-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@cloudflare/workers-types"
          - "@libsql/client"
          - "@types/node"
          - "alchemy"
          - "astro"
          - "libsql"
          - "sharp"
          - "tsdown"
          - "wrangler"
        update-types:
          - patch
          - minor
